<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>JNAO AI</title>
    <style>
      html, body, #root {
        margin: 0; padding: 0; width: 100%; height: 100%;
      }
      body {
        background: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
      }
      #initial-splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100dvh;
        width: 100%;
        position: fixed;
        top: 0; left: 0;
        z-index: 9999;
        background: #ffffff;
        transition: opacity 0.35s ease-out;
      }
      #initial-splash.fade-out { opacity: 0; pointer-events: none; }
      .splash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        transform: translateY(-12vh);
      }
      .splash-logo-row {
        display: flex;
        align-items: baseline;
        gap: 16px;
      }
      .splash-logo {
        font-size: 56px;
        font-weight: 700;
        letter-spacing: 0.04em;
        animation: logoReveal 0.7s 0.1s cubic-bezier(0.22, 0.61, 0.36, 1) both,
                   logoNudge 0.5s 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      .splash-logo .j-red { color: #dc2626; }
      .splash-logo .nao-dark { color: #0f172a; }
      .splash-ai {
        font-size: 56px;
        font-weight: 700;
        color: #0f172a;
        letter-spacing: 0.04em;
        animation: aiPushIn 0.5s 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      @keyframes logoReveal {
        from { opacity: 0; transform: scale(0.6); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes logoNudge {
        0% { transform: translateX(0); }
        30% { transform: translateX(-14px); }
        100% { transform: translateX(-6px); }
      }
      @keyframes aiPushIn {
        from { opacity: 0; transform: translateX(60px); }
        60% { opacity: 1; transform: translateX(-4px); }
        100% { opacity: 1; transform: translateX(0); }
      }
      .splash-tagline {
        margin-top: 20px;
        color: #94a3b8;
        font-size: 13px;
        letter-spacing: 0.08em;
        opacity: 0;
        animation: fadeUp 0.8s 0.5s ease-out forwards;
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <!-- 纯静态品牌加载层，React hydrate 后由 JS 控制消失 -->
    <div id="initial-splash">
      <div class="splash-inner">
        <div class="splash-logo-row">
          <div class="splash-logo"><span class="j-red">J</span><span class="nao-dark">nao</span></div>
          <div class="splash-ai">AI</div>
        </div>
        <div class="splash-tagline">劲脑 · 智能工作台</div>
      </div>
    </div>
    <div id="root"></div>
    <!-- Detect returning visit: if logged in, mark splash for fast dismiss -->
    <script>
      try {
        if (sessionStorage.getItem("jnao_logged_in") === "1") {
          document.getElementById("initial-splash").setAttribute("data-fast", "1");
        }
        sessionStorage.setItem("jnao_visited", "1");
      } catch(e) {}
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
