# 进阶判定 — 与 training_curriculum.yaml main_lines.advance_rule 对应

grade_word_targets:
  # 影像追忆 / 扫描速记：按年级段最低回忆/扫记字数（打卡 content 字段）
  primary_low: 300
  primary_high: 500
  junior: 800
  senior: 1000

rules:
  超脑阅读_一分钟1000字:
    skill: 超脑阅读
    type: words_per_minute
    min_words: 1000
    max_minutes: 1

  影像追忆_年级表:
    skill: 影像追忆
    type: grade_min_words
    field: content

  扫描速记_年级表:
    skill: 扫描速记
    type: grade_min_words
    field: content

  极速运算_70pct_打卡:
    skill: 极速运算
    type: accuracy_pct
    min_pct: 70
    field: accuracy
