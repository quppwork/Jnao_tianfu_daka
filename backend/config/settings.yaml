# JNAO Backend — 服务器与上游配置
# 环境变量可覆盖: JNAO_HOST, JNAO_PORT, TIANFU_RAG_URL, DEEPSEEK_API_KEY

server:
  host: "127.0.0.1"
  port: 8012

upstream:
  tianfu_rag:
    url: "http://192.168.60.199:8010"
    timeout: 120.0
    health_timeout: 0.5

deepseek:
  api_key: "${DEEPSEEK_API_KEY}"
  model: "deepseek-v4-flash"
  timeout: 3.0

doubao:
  api_key: "${DOUBAO_API_KEY}"
  api_base: "${DOUBAO_API_BASE}"
  model: "${DOUBAO_CHAT_MODEL}"
  timeout: 30.0

# 各天赋固定训练视频（url 可为 OSS 或 /static/ 路径）
training:
  # 首日固定课（content_index=0）；未完成则次日仍推同一套
  day_one:
    a_lessons:
      - { skill: 超脑阅读, stage: 1, part: 1 }
    b_lessons: []
  # 次日及以后
  after_day_one:
    strategy: random
  talent_videos:
    "1": { title: "学者·五者天赋视频", url: "/static/training_video.mp4" }
    "2": { title: "思者·五者天赋视频", url: "/static/training_video.mp4" }
    "3": { title: "行者·五者天赋视频", url: "/static/training_video.mp4" }
    "4": { title: "德者·五者天赋视频", url: "/static/training_video.mp4" }
    "5": { title: "赢者·五者天赋视频", url: "/static/training_video.mp4" }

database:
  url: "${DATABASE_URL}"

oss:
  access_key_id: "${OSS_ACCESS_KEY_ID}"
  access_key_secret: "${OSS_ACCESS_KEY_SECRET}"
  bucket: "jnao-talent-ai"
  endpoint: "oss-cn-beijing.aliyuncs.com"
  prefix: "yinpin/"
  signed_url: true
  sign_expires: 7200
